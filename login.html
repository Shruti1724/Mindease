<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MindEase</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link rel="stylesheet" href="styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap');

    :root {
      --primary-color: #8D7B68;
      --secondary-color: #F1DEC9;
      --accent-color: #C8B6A6;
      --dark-color: #5A4330;
      --light-color: #F8F4EA;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--light-color);
      color: var(--dark-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      color: var(--primary-color);
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .login-header p {
      color: var(--dark-color);
      opacity: 0.8;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      color: var(--dark-color);
      font-weight: 500;
    }

    .form-group input {
      padding: 12px;
      border: 1px solid var(--accent-color);
      border-radius: 5px;
      font-size: 1rem;
      background-color: var(--light-color);
      transition: border-color 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .forgot-password {
      color: var(--primary-color);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .forgot-password:hover {
      color: var(--dark-color);
    }

    .login-btn {
      background-color: var(--primary-color);
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .login-btn:hover {
      background-color: var(--dark-color);
    }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .register-link a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .register-link a:hover {
      color: var(--dark-color);
    }

    .social-login {
      margin-top: 30px;
      text-align: center;
    }

    .social-login p {
      margin-bottom: 15px;
      color: var(--dark-color);
      opacity: 0.8;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .social-icons a {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--light-color);
      border-radius: 50%;
      color: var(--primary-color);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .social-icons a:hover {
      background-color: var(--primary-color);
      color: white;
      transform: translateY(-3px);
    }

    @media (max-width: 768px) {
      .login-container {
        margin: 80px 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="index1.html" class="logo">
        <i class="fas fa-brain"></i>
        MindEase
      </a>
      <ul id="menu">
        <li><a href="index1.html">Home</a></li>
        <li><a href="index1.html#about">About</a></li>
        <li><a href="meditation.html">Meditation</a></li>
        <li><a href="breathing.html">Breathing</a></li>
        <li><a href="journal.html">Journal</a></li>
        <li><a href="find_help.html">Find Help</a></li>
        <li><a href="index1.html#contact">Contact</a></li>
      </ul>
      <div class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </div>
    </nav>
  </header>

  <main>
    <div class="login-container">
      <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Sign in to continue your wellness journey</p>
      </div>
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>
        <div class="remember-forgot">
          <label class="remember-me">
            <input type="checkbox" name="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
      <div class="register-link">
        <p>Don't have an account? <a href="register.html">Sign up</a></p>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">
          <i class="fas fa-brain"></i> MindEase
        </div>
      </div>
      <div class="copyright">
        <p>&copy; 2025 MindEase. All rights reserved.</p>
        <p>Made by Shruti Jaggi</p>
      </div>
    </div>
  </footer>

  <script>
    // Menu toggle functionality
    document.getElementById('menuToggle').addEventListener('click', function() {
      document.getElementById('menu').classList.toggle('active');
    });

    // Login form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });
        
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Login failed');
        }
        
        const data = await response.json();
        
        // Store user data in localStorage
        localStorage.setItem('token', data.token);
        localStorage.setItem('userData', JSON.stringify({
          id: data.userId,
          name: data.name,
          email: data.email
        }));
        
        // Show success message
        alert('Login successful! Welcome back, ' + data.name);
        
        // Redirect to home page
        window.location.href = 'index1.html';
      } catch (error) {
        console.error('Login error:', error);
        alert(error.message || 'An error occurred during login. Please try again.');
      }
    });
  </script>
</body>
</html>
